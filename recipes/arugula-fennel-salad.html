        <Title>Arugula Fennel Salad</Title>

    <body>
        <h1>Arugula Fennel Salad</h1>
        This arugula and fennel salad with lemon dressing 
        is a great choice for summer or fall, especially 
        when you're entertaining.

        <h2>Ingredients</h2>

        <h3>Dressing:</h3>

        <ul>
            <li>1/3 cup extra-virgin olive oil</li>
            <li>1/4 cup fresh lemon juice</li>
            <li>1 teaspoon lemon zest</li>
            <li>1/2 teaspoon salt</li>
        </ul>
    </body>
